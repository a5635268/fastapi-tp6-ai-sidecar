version: '3.8'

services:
  fastapi-tp6-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi-tp6:latest
    container_name: fastapi-tp6-app
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=FastAPI Enterprise
      - APP_VERSION=1.0.0
      - DEBUG=false
      - DATABASE_URL=sqlite:///data/test.db
      - JWT_SECRET=your-secret-key-change-in-production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3